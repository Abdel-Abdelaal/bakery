<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Order confirmed</title>
    <style>
      body {
        margin: 0;
        font-family: "Nunito", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(180deg, #ffd8e7, #fff7e8);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        color: #2c2a33;
      }

      .card {
        background: white;
        border-radius: 28px;
        padding: 2rem;
        box-shadow: 0 25px 45px rgba(43, 42, 51, 0.15);
        max-width: 360px;
      }

      .card h1 {
        margin: 0;
        font-size: 2.4rem;
        font-family: "Fredoka", system-ui, sans-serif;
      }

      .card p {
        margin: 1rem 0 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Midnight confirmed</h1>
      <p>Your 50%-off goodies are locked in. We’ll have them lined up, cooled, and ready for pickup soon.</p>
    </div>
  </body>
</html>
