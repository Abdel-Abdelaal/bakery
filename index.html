<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Midnight Bakehouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="glitter" aria-hidden="true"></div>
    <div class="app-shell">
      <header class="hero">
        <div class="hero-image" aria-hidden="true"></div>
        <img
          src="./Images/logo.png"
          alt="Midnight Bakehouse logo"
          class="hero-logo"
          loading="lazy"
        />
      </header>

      <main>
        <section class="section-head">
          <div>
            <p class="section-title">Today's treats</p>
            <p class="section-subtitle">Simple, curated, ready to go</p>
          </div>
        </section>

        <div class="carousel-wrapper">
          <button
            id="scrollLeft"
            class="carousel-arrow carousel-arrow-left"
            type="button"
            aria-label="Show previous sections"
          >
            <span aria-hidden="true">&lt;</span>
          </button>
          <div id="productGrid" class="product-grid"></div>
          <button
            id="scrollRight"
            class="carousel-arrow carousel-arrow-right"
            type="button"
            aria-label="Show next sections"
          >
            <span aria-hidden="true">&gt;</span>
          </button>
        </div>
      </main>

      <div class="cart-scrim" id="cartScrim" hidden></div>

      <aside class="cart-panel" id="cartPanel" aria-live="polite" aria-hidden="true" hidden>
        <div class="cart-header">
          <p>Your quick cart</p>
          <button id="closeCart" class="icon-btn" type="button" aria-label="Close cart">&times;</button>
        </div>
        <div class="cart-body" id="cartBody">
          <p class="cart-empty">Add something sweet to get started.</p>
        </div>
        <div class="cart-footer">
          <p>
            Total
            <span id="cartTotal">$0.00</span>
          </p>
        </div>
      </aside>

      <div class="cart-actions" id="cartActions">
        <button id="cartToggle" class="ghost-btn cart-action-btn" type="button">
          View cart (<span id="cartCount">0</span>)
        </button>
        <button id="checkoutBtn" class="checkout-btn cart-action-btn" type="button">Checkout</button>
      </div>

      <div class="snackbar" id="snackbar" role="status"></div>
    </div>
  </body>
</html>
